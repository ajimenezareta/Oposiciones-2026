<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima vs Tiempo - Edición Genially</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita que salga la barra lateral */
            touch-action: none;
            height: 600px; /* Altura fija para que encaje en Genially */
        }

        .main-bg {
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), 
                              url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        /* Tarjetas más pequeñas para que quepan en el muelle */
        .card {
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            cursor: grab;
            user-select: none;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            width: 100%;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #64748b;
            color: #0f172a;
            z-index: 50;
            line-height: 1.1;
        }

        .card:active {
            cursor: grabbing;
            z-index: 1000;
        }

        /* Contenedores de destino más bajos */
        .drop-zone {
            flex: 1;
            height: 260px;
            border-radius: 25px;
            border: 3px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        #target-tiempo.active { background: rgba(251, 191, 36, 0.2); border-color: #fbbf24; }
        #target-clima.active { background: rgba(14, 165, 233, 0.2); border-color: #0ea5e9; }

        .zone-header {
            font-weight: 900;
            font-size: 1.3rem;
            color: white;
            text-transform: uppercase;
        }

        .zone-sub {
            background: white;
            padding: 1px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.7rem;
            margin-bottom: 8px;
        }

        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .anim-success { animation: success-pop 0.4s ease-out; }

        .shake { animation: shake 0.5s both; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #victory-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            place-items: center;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="main-bg">
        <header class="p-3 flex justify-between items-center w-full max-w-5xl mx-auto">
            <h1 class="text-sm md:text-base font-black text-white bg-white/5 px-3 py-1 rounded-lg">CLIMA VS TIEMPO</h1>
            <div class="bg-white text-slate-900 px-4 py-1 rounded-lg font-black text-base shadow-xl">
                <span id="score">0</span> / 10
            </div>
        </header>

        <!-- AREA DE TARJETAS (Muelle superior) -->
        <div id="card-dock" class="w-full max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-5 gap-2 px-4 mb-3">
            <!-- Dinámico -->
        </div>

        <!-- ZONAS DE SOLTADO -->
        <main class="flex-grow flex items-center justify-center px-4 pb-4">
            <div class="flex flex-row w-full max-w-5xl gap-4 h-full">
                
                <div id="target-tiempo" class="drop-zone" data-type="tiempo">
                    <h2 class="zone-header">TIEMPO</h2>
                    <span class="zone-sub text-amber-600">¿Qué pasa hoy?</span>
                    <div class="mt-auto text-white/20 text-[8px] pb-2 uppercase font-bold text-center">Puntual / Hoy</div>
                </div>

                <div id="target-clima" class="drop-zone" data-type="clima">
                    <h2 class="zone-header">CLIMA</h2>
                    <span class="zone-sub text-sky-600">¿Cómo es siempre?</span>
                    <div class="mt-auto text-white/20 text-[8px] pb-2 uppercase font-bold text-center">Medias / 30 años</div>
                </div>

            </div>
        </main>
    </div>

    <!-- Pantalla Final -->
    <div id="victory-screen">
        <div class="text-center bg-white p-8 rounded-[2rem] shadow-2xl max-w-xs mx-4">
            <div class="text-6xl mb-4">🌤️</div>
            <h2 class="text-3xl font-black text-slate-900 mb-2">¡LOGRADO!</h2>
            <button onclick="location.reload()" class="bg-indigo-600 text-white font-black py-4 px-8 rounded-2xl text-lg w-full mt-4">REINTENTAR</button>
        </div>
    </div>

    <script>
        const cardsData = [
            { text: "Hoy llueve en Pamplona.", type: "tiempo" },
            { text: "Clima mediterráneo continental.", type: "clima" },
            { text: "Temperatura media anual de Navarra.", type: "clima" },
            { text: "Mañana bajará el termómetro.", type: "tiempo" },
            { text: "En el desierto nunca llueve.", type: "clima" },
            { text: "Lluvias frecuentes en otoño.", type: "clima" },
            { text: "Precipitaciones medias anuales.", type: "clima" },
            { text: "Ola de calor de tres días.", type: "tiempo" },
            { text: "Clima oceánico o atlántico.", type: "clima" },
            { text: "Nieve inesperada hoy.", type: "tiempo" }
        ];

        const dock = document.getElementById('card-dock');
        const scoreEl = document.getElementById('score');
        const victoryScreen = document.getElementById('victory-screen');
        let solvedCount = 0;

        [...cardsData].sort(() => Math.random() - 0.5).forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = item.text;
            card.dataset.type = item.type;
            
            let isDragging = false;
            let startX, startY;

            const onStart = (e) => {
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = card.getBoundingClientRect();
                startX = clientX - rect.left;
                startY = clientY - rect.top;
                card.style.position = 'fixed';
                card.style.width = `${rect.width}px`;
                card.style.left = `${rect.left}px`;
                card.style.top = `${rect.top}px`;
                card.style.zIndex = 1000;
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                card.style.left = `${clientX - startX}px`;
                card.style.top = `${clientY - startY}px`;
                document.querySelectorAll('.drop-zone').forEach(z => {
                    if (isOver(card.getBoundingClientRect(), z.getBoundingClientRect())) z.classList.add('active');
                    else z.classList.remove('active');
                });
            };

            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                const cRect = card.getBoundingClientRect();
                let droppedOn = null;
                if (isOver(cRect, document.getElementById('target-clima').getBoundingClientRect())) droppedOn = 'clima';
                if (isOver(cRect, document.getElementById('target-tiempo').getBoundingClientRect())) droppedOn = 'tiempo';

                if (droppedOn === card.dataset.type) {
                    card.style.visibility = 'hidden';
                    solvedCount++;
                    scoreEl.textContent = solvedCount;
                    document.getElementById(`target-${droppedOn}`).classList.add('anim-success');
                    setTimeout(() => document.getElementById(`target-${droppedOn}`).classList.remove('anim-success'), 400);
                    if (solvedCount === 10) victoryScreen.style.display = 'grid';
                } else {
                    card.classList.add('shake');
                    setTimeout(() => { card.classList.remove('shake'); reset(card); }, 500);
                }
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            };

            function reset(el) { el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = '50'; }
            card.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            card.addEventListener('touchstart', onStart);
            document.addEventListener('touchmove', onMove);
            document.addEventListener('touchend', onEnd);
            dock.appendChild(card);
        });

        function isOver(r1, r2) { return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom); }
    </script>
</body>
</html>
